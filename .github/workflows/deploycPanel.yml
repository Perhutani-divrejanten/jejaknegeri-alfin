name: Deploy ke cPanel
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (if any)
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run static generator
        run: node tools/generate.js

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 195.88.211.226
          username: deploy1@bandungbersuara.jabarinfo.id
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: /jejaknegeri/
          timeout: 300000        # ← naikkan dari 120s ke 300s
          dangerous-clean-slate: false
          security: loose        # ← tambah ini, penting untuk cPanel
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            *.bak*
            articles_temp.json
            .DS_Store
            .env
            .env.local
            *.log
            TROUBLESHOOTING.md
            AUDIT_REPORT.md
            PERBAIKAN_STATUS.md
            final-verification.ps1
            fix-encoding.ps1
            rebrand-to-warta-janten.ps1
            replace-logo.ps1
            # tambah file-file besar yang tidak perlu di server:
            tools/article_images.json
            tools/user_image_mapping.json
            *.ps1
            READ-ME.txt
            REBRAND_SUMMARY.txt
            SEARCH_SETUP.md
            test.jpg
